<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#140c1c">
<title>Brrrm!</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:#140c1c; touch-action:none;
              -webkit-user-select:none; user-select:none; }
  #game { position:fixed; inset:0; width:100%; height:100%;
          image-rendering:pixelated; }
  #overlay { position:fixed; inset:0; display:flex; flex-direction:column;
             align-items:center; justify-content:center; gap:12vmin;
             background:#140c1c; z-index:10;
             font-family:"Courier New",monospace; }
  #title { color:#deeed6; font-size:14vmin; font-weight:bold; letter-spacing:0.05em;
           text-shadow:1.5vmin 1.5vmin 0 #d04648; }
  #start { font-family:inherit; font-size:6vmin; font-weight:bold; padding:4vmin 8vmin;
           color:#140c1c; background:#d04648; border:1vmin solid #deeed6;
           box-shadow:0 2vmin 0 #442434; cursor:pointer;
           animation:pulse 1s steps(2,end) infinite; }
  #start:active { transform:translateY(1vmin); box-shadow:0 1vmin 0 #442434; }
  @keyframes pulse { 50% { background:#d27d2c; } }
  .hud { position:fixed; z-index:5; width:11vmin; height:11vmin; font-size:6vmin;
         background:#14212ccc; color:#deeed6; border:0.6vmin solid #deeed6;
         display:none; align-items:center; justify-content:center; }
  #mute { top:max(2vmin, env(safe-area-inset-top)); left:2vmin; }
  #mic  { top:max(2vmin, env(safe-area-inset-top)); right:2vmin; }
  .hud.off { opacity:0.4; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="overlay">
  <div id="title">BRRRM!</div>
  <button id="start">START ENGINE</button>
</div>
<button id="mute" class="hud">🔊</button>
<button id="mic" class="hud off">🎤</button>
<script type="module" src="src/main.js"></script>
</body>
</html>
