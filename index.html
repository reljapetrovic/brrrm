<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#140c1c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<title>Brrrm!</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:#140c1c; touch-action:none;
              -webkit-user-select:none; user-select:none; }
  #game { position:fixed; inset:0; width:100%; height:100%;
          image-rendering:pixelated; }
  #overlay { position:fixed; inset:0; display:flex; flex-direction:column;
             align-items:center; justify-content:center; gap:5vmin;
             background:#140c1c; z-index:10;
             font-family:"Courier New",monospace; }
  #title { color:#deeed6; font-size:12vmin; font-weight:bold; letter-spacing:0.05em;
           text-shadow:1.5vmin 1.5vmin 0 #d04648; }
  #instructions { color:#deeed6; font-size:4vmin; font-weight:bold;
                  line-height:2; text-align:left; }
  #sizes { display:flex; gap:4vmin; align-items:center; }
  .sizeBtn { width:16vmin; height:16vmin; background:#14212c; cursor:pointer;
             border:0.6vmin solid #757161;
             display:flex; align-items:center; justify-content:center; }
  .sizeBtn.sel { border-color:#dad45e; background:#442434; }
  #toyviews { display:flex; gap:4vmin; }
  .toyBtn { font-family:inherit; font-size:4vmin; font-weight:bold; padding:2vmin 4vmin;
            color:#deeed6; background:#14212c; border:0.6vmin solid #757161; cursor:pointer; }
  .toyBtn.sel { border-color:#dad45e; background:#442434; }
  #start { font-family:inherit; font-size:6vmin; font-weight:bold; padding:4vmin 8vmin;
           color:#140c1c; background:#d04648; border:1vmin solid #deeed6;
           box-shadow:0 2vmin 0 #442434; cursor:pointer;
           animation:pulse 1s steps(2,end) infinite; }
  #start:active { transform:translateY(1vmin); box-shadow:0 1vmin 0 #442434; }
  #start { position:relative; }
  #ring { position:absolute; left:50%; top:50%; width:34vmin; height:34vmin;
          transform:translate(-50%,-50%); border-radius:50%; opacity:0;
          pointer-events:none;
          background:conic-gradient(#dad45e var(--p,0deg), #14212c 0);
          -webkit-mask:radial-gradient(transparent 58%, #000 60%);
          mask:radial-gradient(transparent 58%, #000 60%); }
  @keyframes pulse { 50% { background:#d27d2c; } }
  .hud { position:fixed; z-index:5; width:11vmin; height:11vmin; font-size:6vmin;
         background:#14212ccc; color:#deeed6; border:0.6vmin solid #deeed6;
         display:none; align-items:center; justify-content:center; }
  #mute { top:max(2vmin, env(safe-area-inset-top)); left:2vmin; }
  #mic  { top:max(2vmin, env(safe-area-inset-top)); right:2vmin; }
  .hud.off { opacity:0.4; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="overlay">
  <div id="title">BRRRM!</div>
  <div id="instructions">
    <div>📱 PUSH ME AROUND</div>
    <div>🫨 SHAKE ME!</div>
    <div>👆 TAP MY PARTS</div>
    <div>🙃 FLIP = STALL</div>
    <div>🎤 YELL BRRRM!</div>
  </div>
  <div id="toyviews">
    <button class="toyBtn" data-toyview="top">⬇ TOP</button>
    <button class="toyBtn" data-toyview="side">➡ SIDE</button>
  </div>
  <div id="sizes">
    <button class="sizeBtn" data-view="96" style="font-size:5vmin">🚜</button>
    <button class="sizeBtn" data-view="64" style="font-size:8vmin">🚜</button>
    <button class="sizeBtn" data-view="40" style="font-size:11vmin">🚜</button>
  </div>
  <button id="start"><div id="ring"></div>START ENGINE</button>
</div>
<button id="mute" class="hud">🔊</button>
<button id="mic" class="hud off">🎤</button>
<script type="module" src="src/main.js"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
